<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#ffffff08" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff08" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff08" stroke-width="1"/>

  <!-- Decorative calibration-curve shape (right side) -->
  <polyline
    points="660,520 700,480 740,460 780,430 820,390 860,340 900,270 940,215 980,195 1020,190 1060,188 1100,187 1140,186"
    fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- Perfect calibration diagonal reference -->
  <line x1="660" y1="520" x2="1140" y2="40" stroke="#ffffff18" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- Confidence interval band -->
  <polygon
    points="660,530 700,495 740,478 780,450 820,414 860,366 900,298 940,245 980,225 1020,220 1060,217 1140,215
             1140,159 1060,159 1020,160 980,165 940,185 900,242 860,314 820,366 780,410 740,442 700,465 660,510"
    fill="#3b82f6" opacity="0.1"/>

  <!-- Left content area -->
  <!-- Tag: RESEARCH SYSTEM -->
  <rect x="80" y="80" width="220" height="34" rx="17" fill="#3b82f626"/>
  <text x="190" y="103" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600"
        fill="#93c5fd" text-anchor="middle" letter-spacing="2">RESEARCH SYSTEM</text>

  <!-- Main title -->
  <text x="80" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="54" font-weight="700"
        fill="#f8fafc" letter-spacing="-1">Uncertainty-Aware</text>
  <text x="80" y="252" font-family="'Segoe UI', system-ui, sans-serif" font-size="54" font-weight="700"
        fill="#f8fafc" letter-spacing="-1">Political</text>
  <!-- "Prediction" with gradient fill via trick: colored rect + clip -->
  <defs>
    <clipPath id="txt-clip">
      <text x="80" y="319" font-family="'Segoe UI', system-ui, sans-serif" font-size="54" font-weight="700"
            letter-spacing="-1">Prediction</text>
    </clipPath>
  </defs>
  <rect x="0" y="260" width="620" height="80" fill="url(#accent)" clip-path="url(#txt-clip)"/>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">
    Calibrated probability forecasts · 8 event categories
  </text>
  <text x="80" y="410" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">
    Signed audit trail · Market-implied benchmarks
  </text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="80" y="460" width="160" height="90" rx="12" fill="#ffffff0d" stroke="#ffffff14" stroke-width="1"/>
  <text x="160" y="500" font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="700"
        fill="#60a5fa" text-anchor="middle">~53%</text>
  <text x="160" y="524" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b"
        text-anchor="middle">vs market baseline</text>
  <text x="160" y="542" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b"
        text-anchor="middle">win rate (OOS)</text>

  <!-- Stat 2 -->
  <rect x="260" y="460" width="140" height="90" rx="12" fill="#ffffff0d" stroke="#ffffff14" stroke-width="1"/>
  <text x="330" y="500" font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="700"
        fill="#a78bfa" text-anchor="middle">8</text>
  <text x="330" y="524" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b"
        text-anchor="middle">event</text>
  <text x="330" y="542" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b"
        text-anchor="middle">categories</text>

  <!-- Stat 3 -->
  <rect x="420" y="460" width="170" height="90" rx="12" fill="#ffffff0d" stroke="#ffffff14" stroke-width="1"/>
  <text x="505" y="500" font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="700"
        fill="#34d399" text-anchor="middle">SHA-256</text>
  <text x="505" y="524" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b"
        text-anchor="middle">signed</text>
  <text x="505" y="542" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b"
        text-anchor="middle">audit trail</text>

  <!-- Bottom GitHub label -->
  <text x="80" y="606" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#475569">
    github.com/OliverKlug/Uncertainty-aware-political-prediction
  </text>
</svg>
